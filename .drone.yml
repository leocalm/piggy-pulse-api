---
kind: pipeline
type: docker
name: default

trigger:
  branch:
    - main
  event:
    - push
    - promote
    - rollback

steps:
  - name: build-and-push
    image: docker:27-cli
    volumes:
      - name: dockersock
        path: /var/run/docker.sock
    environment:
      GHCR_USERNAME:
        from_secret: ghcr_username
      GHCR_TOKEN:
        from_secret: ghcr_token
    when:
      branch:
        - main
      event:
        - push
        - promote
    commands:
      - echo "🔨 Building Docker images..."
      - apk add --no-cache git
      - SHORT_SHA=$(echo "$DRONE_COMMIT_SHA" | cut -c1-7)
      - OWNER=$(echo "$DRONE_REPO_NAMESPACE" | tr '[:upper:]' '[:lower:]')
      - echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
      - docker build --platform linux/amd64
          --cache-from "ghcr.io/$OWNER/piggy-pulse-api:buildcache"
          --build-arg BUILDKIT_INLINE_CACHE=1
          -t "ghcr.io/$OWNER/piggy-pulse-api:latest"
          -t "ghcr.io/$OWNER/piggy-pulse-api:$SHORT_SHA"
          .
      - docker push "ghcr.io/$OWNER/piggy-pulse-api:latest"
      - docker push "ghcr.io/$OWNER/piggy-pulse-api:$SHORT_SHA"
      - docker push "ghcr.io/$OWNER/piggy-pulse-api:buildcache" || true
      - docker build --platform linux/amd64
          --cache-from "ghcr.io/$OWNER/piggy-pulse-cron:buildcache"
          --build-arg BUILDKIT_INLINE_CACHE=1
          -f Dockerfile.cron
          -t "ghcr.io/$OWNER/piggy-pulse-cron:latest"
          -t "ghcr.io/$OWNER/piggy-pulse-cron:$SHORT_SHA"
          .
      - docker push "ghcr.io/$OWNER/piggy-pulse-cron:latest"
      - docker push "ghcr.io/$OWNER/piggy-pulse-cron:$SHORT_SHA"
      - docker push "ghcr.io/$OWNER/piggy-pulse-cron:buildcache" || true
      - echo "✅ Images pushed for $SHORT_SHA"

  - name: deploy
    image: docker:27-cli
    volumes:
      - name: dockersock
        path: /var/run/docker.sock
      - name: app-dir
        path: /app
    environment:
      GHCR_USERNAME:
        from_secret: ghcr_username
      GHCR_TOKEN:
        from_secret: ghcr_token
    when:
      branch:
        - main
      event:
        - push
        - promote
        - rollback
    commands:
      - echo "🚀 Starting deployment to production..."
      - apk add --no-cache docker-cli-compose
      - docker compose version
      - echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
      - cd /app/piggy-pulse
      - docker compose pull api cron
      - docker compose up -d api cron
      - docker image prune -af
      - echo "✅ Deployed version ${DRONE_COMMIT_SHA:0:7}"

  - name: notify-success
    image: plugins/slack
    settings:
      webhook:
        from_secret: slack_webhook  # pragma: allowlist secret
      channel: deployments
      username: Drone CI
      icon_emoji: rocket
      template: >
        ✅ *Deploy succeeded* — <{{build.link}}|build #{{build.number}}>
        *Repo:* {{repo.name}}
        *Branch:* {{build.branch}}
        *Commit:* <{{build.link}}|{{truncate build.commit 7}}> — {{build.message}}
        *Author:* {{build.author}}
    when:
      status:
        - success
      branch:
        - main
      event:
        - push
        - promote
        - rollback

  - name: notify-failure
    image: plugins/slack
    settings:
      webhook:
        from_secret: slack_webhook  # pragma: allowlist secret
      channel: deployments
      username: Drone CI
      icon_emoji: rotating_light
      template: >
        ❌ *Deploy failed* — <{{build.link}}|build #{{build.number}}>
        *Repo:* {{repo.name}}
        *Branch:* {{build.branch}}
        *Commit:* <{{build.link}}|{{truncate build.commit 7}}> — {{build.message}}
        *Author:* {{build.author}}
    when:
      status:
        - failure
      branch:
        - main
      event:
        - push
        - promote
        - rollback

volumes:
  - name: dockersock
    host:
      path: /var/run/docker.sock
  - name: app-dir
    host:
      path: /opt/piggypulse
