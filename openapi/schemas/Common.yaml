PaginatedResponse:
  type: object
  required:
    - data
    - nextCursor
    - totalCount
    - hasMore
  properties:
    data:
      type: array
      items: { }       # overridden per-use with allOf
    totalCount:
      type: integer
      description: Total number of items in the collection
      example: 100
    hasMore:
      type: boolean
      description: Whether there are more items to fetch
    nextCursor:
      type: [ string, "null" ]
      description: Cursor for fetching the next page. Always null when hasMore is false.

ErrorResponse:
  type: object
  required:
    - message
  properties:
    message:
      type: string
      example: "Unauthorized"
    code:
      type: string
      example: "UNAUTHORIZED"

