CurrencyResponse:
  type: object
  description: Currency
  required:
    - id
    - name
    - symbol
    - decimalPlaces
    - symbolPosition
  properties:
    id:
      type: string
      format: uuid
      description: Currency ID
      example: 123e4567-e89b-12d3-a456-426614174000
    name:
      type: string
      description: Currency name
      example: "Euro"
    symbol:
      type: string
      description: Currency symbol
      example: "€"
    decimalPlaces:
      type: integer
      description: Number of decimal places
      example: 2
    symbolPosition:
      type: string
      enum: ["prefix", "suffix"]
      description: Position of currency symbol
      example: "prefix"
