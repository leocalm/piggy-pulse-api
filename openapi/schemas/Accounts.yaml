AccountBase:
  type: object
  required:
    - id
    - name
    - type
    - color
    - status
  properties:
    id:
      type: string
      format: uuid
      description: Account ID
      example: "123e4567-e89b-12d3-a456-426655440000"
    name:
      type: string
      description: Account name
      example: "Main Checking Account"
    color:
      type: string
      description: Account color in #RRGGBB hex format
      pattern: '^#[0-9A-Fa-f]{6}$'
      example: "#000000"
    type:
      type: string
      description: Account type
      enum: ["Checking", "Savings", "CreditCard", "Allowance", "Wallet"]
    status:
      type: string
      enum: ["active", "inactive"]
      description: Account status
      example: "active"

AccountResponse:
  allOf:
    - $ref: '#/AccountBase'
    - type: object
      required:
        - initialBalance
        - currency
        - spendLimit
      properties:
        initialBalance:
          type: integer
          example: 10000
        currency:
          $ref: './Misc.yaml#/CurrencyResponse'
        spendLimit:
          type: [integer, "null"]
          description: Spend limit in cents. Always null for checking, savings, and wallet accounts.
          minimum: 0
          example: 50000

AccountListResponse:
  allOf:
    - $ref: './Common.yaml#/PaginatedResponse'
    - type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/AccountResponse'

CreateAccountRequest:
  type: object
  required:
    - name
    - type
    - color
    - initialBalance
    - currencyId
  properties:
    name:
      type: string
      description: Account name
      example: "Main Checking Account"
    color:
      type: string
      description: Account color in #RRGGBB hex format
      pattern: '^#[0-9A-Fa-f]{6}$'
      example: "#000000"
    initialBalance:
      type: integer
      description: Initial balance in cents
      example: 10000
    currencyId:
      type: string
      format: uuid
      description: Currency ID
      example: "123e4567-e89b-12d3-a456-426655440000"
    type:
      type: string
      enum: ["Checking", "Savings", "CreditCard", "Allowance", "Wallet"]
    spendLimit:
      type: [integer, "null"]
      description: Optional spend limit in cents. Only meaningful for creditCard and allowance accounts.
      minimum: 0
      example: 50000

UpdateAccountRequest:
  allOf:
    - $ref: '#/CreateAccountRequest'

AccountOptionResponse:
  type: object
  required:
    - id
    - name
    - color
  properties:
    id:
      type: string
      format: uuid
      description: Account ID
      example: "123e4567-e89b-12d3-a456-426655440000"
    name:
      type: string
      description: Account name
      example: "Main Checking Account"
    color:
      type: string
      description: Account color in #RRGGBB hex format
      pattern: '^#[0-9A-Fa-f]{6}$'
      example: "#000000"

AccountOptionListResponse:
  type: array
  items:
    $ref: '#/AccountOptionResponse'

AccountSummaryResponse:
  allOf:
    - $ref: '#/AccountBase'
    - type: object
      required:
        - currentBalance
        - netChangeThisPeriod
        - nextTransfer
        - balanceAfterNextTransfer
        - numberOfTransactions
      properties:
        currentBalance:
          type: integer
          description: Current balance in cents
          example: 10000
        netChangeThisPeriod:
          type: integer
          description: Net change this period in cents
          example: 1000
        nextTransfer:
          type: [string, "null"]
          format: date
          description: Next transfer date
          example: "2023-01-02"
        balanceAfterNextTransfer:
          type: [integer, "null"]
          description: Balance after next transfer in cents
          example: 1000
        numberOfTransactions:
          type: integer
          description: Number of transactions
          example: 10
          minimum: 0

AccountSummaryListResponse:
  allOf:
    - $ref: './Common.yaml#/PaginatedResponse'
    - type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/AccountSummaryResponse'

LargestOutflow:
  type: object
  required:
    - categoryName
    - value
  properties:
    categoryName:
      type: string
      description: Category name
      example: "Groceries"
    value:
      type: integer
      description: Value in cents
      example: 1000
      minimum: 0

StabilityContext:
  type: object
  required:
    - periodsOnTarget
    - averageClosingBalance
    - highestClosingBalance
    - lowestClosingBalance
    - largestSingleOutflow
  properties:
    periodsOnTarget:
      type: integer
      description: Periods on target
      example: 10
      minimum: 0
    averageClosingBalance:
      type: integer
      description: Average closing balance in cents
      example: 10000
    highestClosingBalance:
      type: integer
      description: Highest closing balance in cents
      example: 10000
    lowestClosingBalance:
      type: integer
      description: Lowest closing balance in cents
      example: 10000
    largestSingleOutflow:
      oneOf:
        - type: "null"
        - $ref: '#/LargestOutflow'

CategoryBreakdownItem:
  type: object
  required:
    - categoryId
    - categoryName
    - value
  properties:
    categoryId:
      type: string
      format: uuid
      description: Category ID
      example: "123e4567-e89b-12d3-a456-426655440000"
    categoryName:
      type: string
      example: "Groceries"
    value:
      type: integer
      minimum: 0
      example: 1000

TransactionBreakdownItem:
  type: object
  required:
    - date
    - description
    - categoryName
    - amount
    - balance
  properties:
    date:
      type: string
      format: date
    description:
      type: string
    categoryName:
      type: string
    amount:
      type: integer
      minimum: 0
    balance:
      type: integer

AccountCategoriesBreakdown:
  type: array
  items:
    $ref: '#/CategoryBreakdownItem'

AccountTransactionsBreakdown:
  type: array
  items:
    $ref: '#/TransactionBreakdownItem'

AccountDetailsResponse:
  allOf:
    - $ref: '#/AccountSummaryResponse'
    - type: object
      required:
        - inflow
        - outflow
        - stabilityContext
        - categoriesBreakdown
        - transactionsBreakdown
        - spentThisCycle
        - avgDailyBalance
      properties:
        inflow:
          type: integer
          description: Inflow in cents
          example: 1000
          minimum: 0
        outflow:
          type: integer
          description: Outflow in cents
          example: 1000
          minimum: 0
        stabilityContext:
          $ref: '#/StabilityContext'
        categoriesBreakdown:
          $ref: '#/AccountCategoriesBreakdown'
        transactionsBreakdown:
          $ref: '#/AccountTransactionsBreakdown'
        topUpAmount:
          type: [integer, "null"]
          description: Top-up amount in cents. Only present for Allowance accounts.
          minimum: 0
          example: 20000
        topUpCycle:
          type: [string, "null"]
          description: Top-up frequency. Only present for Allowance accounts.
          enum: ["weekly", "bi-weekly", "monthly", null]
          example: "monthly"
        topUpDay:
          type: [integer, "null"]
          description: Day of week (0–6) or day of month (1–31) for the top-up, depending on cycle. Only present for Allowance accounts.
          example: 1
        spentThisCycle:
          type: integer
          description: Amount spent in the current top-up cycle in cents. Always 0 for non-Allowance accounts.
          minimum: 0
          example: 5000
        statementCloseDay:
          type: [integer, "null"]
          description: Day of month the statement closes (1–31). Only present for CreditCard accounts.
          example: 25
        paymentDueDay:
          type: [integer, "null"]
          description: Day of month the payment is due (1–31). Only present for CreditCard accounts.
          example: 15
        avgDailyBalance:
          type: integer
          description: Average daily balance this period in cents. Always 0 for non-Checking accounts.
          example: 120000

AccountBalanceHistoryPoint:
  type: object
  required:
    - date
    - balance
    - transactionCount
  properties:
    date:
      type: string
      format: date
      example: "2024-01-15"
    balance:
      type: integer
      description: Account balance in cents at end of day
      example: 150000
    transactionCount:
      type: integer
      minimum: 0
      example: 3

AccountBalanceHistoryResponse:
  type: array
  items:
    $ref: '#/AccountBalanceHistoryPoint'

AdjustBalanceRequest:
  type: object
  required:
    - newBalance
  properties:
    newBalance:
      type: integer
      description: New absolute balance in cents
      example: 150000
