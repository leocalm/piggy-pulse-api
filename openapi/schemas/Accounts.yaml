EncryptedAccountResponse:
  type: object
  required:
    - id
    - accountType
    - status
    - currencyId
    - nameEnc
    - colorEnc
    - currentBalanceEnc
  properties:
    id:
      type: string
      format: uuid
    accountType:
      type: string
      enum: [checking, savings, creditcard, wallet, allowance]
    status:
      type: string
      enum: [active, inactive]
    currencyId:
      type: string
      format: uuid
    nameEnc:
      type: string
      description: Base64-encoded AES-GCM envelope (12-byte nonce + ciphertext + 16-byte tag) for the UTF-8 name
    colorEnc:
      type: string
      description: Base64-encoded AES-GCM envelope for the color string
    currentBalanceEnc:
      type: string
      description: Base64-encoded AES-GCM envelope for the i64 LE balance in cents
    spendLimitEnc:
      type: [string, "null"]
    nextTransferAmountEnc:
      type: [string, "null"]
    topUpAmountEnc:
      type: [string, "null"]
    topUpCycle:
      type: [string, "null"]
      enum: ["weekly", "bi-weekly", "monthly", null]
    topUpDay:
      type: [integer, "null"]
    statementCloseDay:
      type: [integer, "null"]
    paymentDueDay:
      type: [integer, "null"]

AccountListResponse:
  allOf:
    - $ref: './Common.yaml#/PaginatedResponse'
    - type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/EncryptedAccountResponse'

CreateAccountRequest:
  type: object
  description: |
    Plaintext account fields. The server encrypts name, color,
    initialBalance, spendLimit, nextTransferAmount, and topUpAmount
    using the caller's session DEK before inserting the row.
  required:
    - accountType
    - name
    - color
    - currencyId
    - initialBalance
  properties:
    accountType:
      type: string
      enum: [checking, savings, creditcard, wallet, allowance]
    name:
      type: string
    color:
      type: string
    currencyId:
      type: string
      format: uuid
    initialBalance:
      type: integer
    spendLimit:
      type: [integer, "null"]
    nextTransferAmount:
      type: [integer, "null"]
    topUpAmount:
      type: [integer, "null"]
    topUpCycle:
      type: [string, "null"]
      enum: ["weekly", "bi-weekly", "monthly", null]
    topUpDay:
      type: [integer, "null"]
    statementCloseDay:
      type: [integer, "null"]
    paymentDueDay:
      type: [integer, "null"]

UpdateAccountRequest:
  allOf:
    - $ref: '#/CreateAccountRequest'

AccountOptionResponse:
  type: object
  required:
    - id
    - accountType
    - nameEnc
    - colorEnc
  properties:
    id:
      type: string
      format: uuid
    accountType:
      type: string
      enum: [checking, savings, creditcard, wallet, allowance]
    nameEnc:
      type: string
    colorEnc:
      type: string

AccountOptionListResponse:
  type: array
  items:
    $ref: '#/AccountOptionResponse'

AdjustBalanceRequest:
  type: object
  required:
    - newBalance
  properties:
    newBalance:
      type: integer
      description: New absolute balance in cents. The server encrypts it and writes to current_balance_enc under SELECT FOR UPDATE.
