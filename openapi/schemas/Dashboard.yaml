CurrentPeriod:
  type: object
  required:
    - spent
    - target
    - daysRemaining
    - daysInPeriod
    - projectedSpend
  properties:
    spent:
      type: integer
      description: Amount spent in the current period, in cents
      example: 10050
      minimum: 0
    target:
      type: integer
      description: Target amount for the current period, in cents
      example: 10000
      minimum: 0
    daysRemaining:
      type: integer
      description: Number of days remaining in the current period
      example: 10
      minimum: 0
    daysInPeriod:
      type: integer
      description: Number of days in the current period
      example: 30
      minimum: 0
    projectedSpend:
      type: integer
      description: Projected spend for the current period, in cents
      example: 10000
      minimum: 0

NetPosition:
  type: object
  required:
    - total
    - differenceThisPeriod
    - numberOfAccounts
    - liquidAmount
    - protectedAmount
    - debtAmount
  properties:
    total:
      type: integer
      description: Total net position, in cents
      example: 10000
    differenceThisPeriod:
      type: integer
      description: Difference between the current period and the previous period, in cents
      example: 1000
    numberOfAccounts:
      type: integer
      description: Number of accounts in the net position
      example: 2
      minimum: 0
    liquidAmount:
      type: integer
      description: Liquid amount in the net position, in cents
      example: 10000
      minimum: 0
    protectedAmount:
      type: integer
      description: Protected amount in the net position, in cents
      example: 10000
      minimum: 0
    debtAmount:
      type: integer
      description: Debt amount in the net position, in cents
      example: 10000
      minimum: 0

BudgetStability:
  type: object
  required:
    - stability
    - periodsWithinRange
    - periodsStability
  properties:
    stability:
      type: integer
      description: Stability of the budget, as a percentage
      example: 99
      minimum: 0
    periodsWithinRange:
      type: integer
      description: Number of periods within the budget stability range
      example: 10
      minimum: 0
    periodsStability:
      type: array
      items:
        type: boolean
      description: List of periods within the budget stability range
      example: [true, false, true]

NetPositionHistoryPoint:
  type: object
  required:
    - date
    - total
    - liquidAmount
    - protectedAmount
    - debtAmount
  properties:
    date:
      type: string
      format: date
      example: '2024-01-15'
    total:
      type: integer
      description: Net position in cents at end of day
      example: 150000
    liquidAmount:
      type: integer
      description: Liquid assets in cents
      example: 200000
      minimum: 0
    protectedAmount:
      type: integer
      description: Protected assets in cents
      example: 50000
      minimum: 0
    debtAmount:
      type: integer
      description: Debt in cents
      example: 100000
      minimum: 0

NetPositionHistoryResponse:
  type: array
  items:
    $ref: '#/NetPositionHistoryPoint'

CurrentPeriodHistoryPoint:
  type: object
  required:
    - date
    - cumulativeSpent
    - dailySpent
  properties:
    date:
      type: string
      format: date
      example: '2024-01-15'
    cumulativeSpent:
      type: integer
      description: Cumulative spending in cents as of end of day
      example: 45000
      minimum: 0
    dailySpent:
      type: integer
      description: Spending on that day in cents
      example: 5000
      minimum: 0

CurrentPeriodHistoryResponse:
  type: array
  items:
    $ref: '#/CurrentPeriodHistoryPoint'

SpendingTrendItem:
  type: object
  required:
    - periodId
    - periodName
    - totalSpent
  properties:
    periodId:
      type: string
      format: uuid
      description: Period ID
      example: 123e4567-e89b-12d3-a456-426655440000
    periodName:
      type: string
      description: Short period label
      example: Mar
    totalSpent:
      type: integer
      description: Total spending in cents for this period
      example: 435000
      minimum: 0

SpendingTrendResponse:
  type: object
  required:
    - periods
    - periodAverage
  properties:
    periods:
      type: array
      items:
        $ref: '#/SpendingTrendItem'
    periodAverage:
      type: integer
      description: Average spend across the included periods, in cents
      example: 435000
      minimum: 0

TopVendorItem:
  type: object
  required:
    - vendorId
    - vendorName
    - totalSpent
    - transactionCount
  properties:
    vendorId:
      type: string
      format: uuid
      description: Unique identifier of the vendor
      example: 123e4567-e89b-12d3-a456-426655440000
    vendorName:
      type: string
      description: Name of the vendor
      example: Supermarket
    totalSpent:
      type: integer
      description: Total spent at this vendor in cents for the period
      example: 15000
      minimum: 0
    transactionCount:
      type: integer
      description: Number of transactions at this vendor
      example: 12
      minimum: 0

TopVendorsResponse:
  type: array
  items:
    $ref: '#/TopVendorItem'

CashFlowResponse:
  type: object
  required:
    - inflows
    - outflows
    - net
  properties:
    inflows:
      type: integer
      description: Total inflows in cents for the period
      example: 500000
    outflows:
      type: integer
      description: Total outflows in cents for the period
      example: 350000
    net:
      type: integer
      description: Net cash flow (inflows - outflows) in cents
      example: 150000
