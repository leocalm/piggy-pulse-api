EncryptedTransactionResponse:
  type: object
  required:
    - id
    - seq
    - date
    - firstCreatedAt
    - fromAccountId
    - amountEnc
    - descriptionEnc
  properties:
    id:
      type: string
      format: uuid
    seq:
      type: integer
      format: int64
      description: Monotonic sequence number within the user's ledger
    date:
      type: string
      format: date
      description: Occurred-at date (plaintext, structural)
    firstCreatedAt:
      type: string
      format: date-time
    fromAccountId:
      type: string
      format: uuid
    toAccountId:
      type: [string, "null"]
      format: uuid
    categoryId:
      type: [string, "null"]
      format: uuid
    vendorId:
      type: [string, "null"]
      format: uuid
    amountEnc:
      type: string
      description: Base64 AES-GCM envelope for the i64 LE amount in cents
    descriptionEnc:
      type: string
      description: Base64 AES-GCM envelope for the UTF-8 description

CreateTransactionRequest:
  type: object
  description: |
    Plaintext transaction fields. The server encrypts amount and
    description with the caller's DEK before inserting a new ledger
    row.
  required:
    - amount
    - description
    - occurredAt
    - categoryId
    - fromAccountId
  properties:
    amount:
      type: integer
      minimum: 0
    description:
      type: string
      minLength: 3
    occurredAt:
      type: string
      format: date
    categoryId:
      type: string
      format: uuid
    fromAccountId:
      type: string
      format: uuid
    toAccountId:
      type: [string, "null"]
      format: uuid
    vendorId:
      type: [string, "null"]
      format: uuid

UpdateTransactionRequest:
  allOf:
    - $ref: '#/CreateTransactionRequest'
