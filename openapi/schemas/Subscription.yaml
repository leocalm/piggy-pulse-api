SubscriptionStatus:
  type: string
  enum: [active, cancelled, paused]

BillingCycle:
  type: string
  enum: [monthly, quarterly, yearly]

EncryptedSubscriptionResponse:
  type: object
  required:
    - id
    - categoryId
    - billingCycle
    - billingDay
    - nextChargeDate
    - status
    - createdAt
    - updatedAt
    - nameEnc
    - billingAmountEnc
  properties:
    id:
      type: string
      format: uuid
    categoryId:
      type: string
      format: uuid
    vendorId:
      type: [string, "null"]
      format: uuid
    billingCycle:
      $ref: '#/BillingCycle'
    billingDay:
      type: integer
      minimum: 1
      maximum: 31
    nextChargeDate:
      type: string
      format: date
    status:
      $ref: '#/SubscriptionStatus'
    cancelledAt:
      type: [string, "null"]
      format: date-time
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    nameEnc:
      type: string
      description: Base64 AES-GCM envelope for the subscription name
    billingAmountEnc:
      type: string
      description: Base64 AES-GCM envelope for the i64 LE billing amount in cents

SubscriptionListResponse:
  type: array
  items:
    $ref: '#/EncryptedSubscriptionResponse'

CreateSubscriptionRequest:
  type: object
  required:
    - name
    - categoryId
    - billingAmount
    - billingCycle
    - billingDay
    - nextChargeDate
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 255
    categoryId:
      type: string
      format: uuid
    vendorId:
      type: [string, "null"]
      format: uuid
    billingAmount:
      type: integer
      minimum: 1
    billingCycle:
      $ref: '#/BillingCycle'
    billingDay:
      type: integer
      minimum: 1
      maximum: 31
    nextChargeDate:
      type: string
      format: date

UpdateSubscriptionRequest:
  allOf:
    - $ref: '#/CreateSubscriptionRequest'

CancelSubscriptionRequest:
  type: object
  properties:
    cancellationDate:
      type: [string, "null"]
      format: date
