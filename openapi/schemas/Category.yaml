EncryptedCategoryResponse:
  type: object
  required:
    - id
    - type
    - isSystem
    - status
    - nameEnc
  properties:
    id:
      type: string
      format: uuid
    type:
      type: string
      enum: [income, expense, transfer]
    behavior:
      type: [string, "null"]
      enum: [fixed, variable, subscription, null]
    parentId:
      type: [string, "null"]
      format: uuid
    isSystem:
      type: boolean
    status:
      type: string
      enum: [active, inactive]
    nameEnc:
      type: string
      description: Base64 AES-GCM envelope for the category name
    colorEnc:
      type: [string, "null"]
    iconEnc:
      type: [string, "null"]
    descriptionEnc:
      type: [string, "null"]

CategoryListResponse:
  allOf:
    - $ref: './Common.yaml#/PaginatedResponse'
    - type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/EncryptedCategoryResponse'

CategoryOptionResponse:
  type: object
  required:
    - id
    - type
    - nameEnc
  properties:
    id:
      type: string
      format: uuid
    type:
      type: string
      enum: [income, expense, transfer]
    behavior:
      type: [string, "null"]
      enum: [fixed, variable, subscription, null]
    nameEnc:
      type: string
    colorEnc:
      type: [string, "null"]
    iconEnc:
      type: [string, "null"]

CategoryOptionListResponse:
  type: array
  items:
    $ref: '#/CategoryOptionResponse'

CreateCategoryRequest:
  type: object
  description: |
    Plaintext category fields. The server encrypts name, color, icon,
    and description with the caller's DEK.
  required:
    - name
    - type
    - icon
  properties:
    name:
      type: string
    type:
      type: string
      enum: [income, expense, transfer]
    icon:
      type: string
    color:
      type: [string, "null"]
    description:
      type: [string, "null"]
    behavior:
      type: [string, "null"]
      enum: [fixed, variable, subscription, null]
    parentId:
      type: [string, "null"]
      format: uuid

UpdateCategoryRequest:
  allOf:
    - $ref: '#/CreateCategoryRequest'

# Targets (budget_category) — simple list of encrypted values; any
# previous/projected/spent aggregation is computed client-side.

EncryptedTargetResponse:
  type: object
  required:
    - id
    - categoryId
    - isExcluded
    - budgetedValueEnc
  properties:
    id:
      type: string
      format: uuid
    categoryId:
      type: string
      format: uuid
    isExcluded:
      type: boolean
    budgetedValueEnc:
      type: string
      description: Base64 AES-GCM envelope for the i64 LE target value in cents

TargetListResponse:
  type: array
  items:
    $ref: '#/EncryptedTargetResponse'

CreateTargetRequest:
  type: object
  required:
    - categoryId
    - value
  properties:
    categoryId:
      type: string
      format: uuid
    value:
      type: integer
      minimum: 0
      description: Target amount in cents (plaintext; encrypted server-side)

UpdateTargetRequest:
  type: object
  required:
    - value
  properties:
    value:
      type: integer
      minimum: 0
