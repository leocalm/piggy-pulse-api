VendorBase:
  type: object
  required:
    - id
    - name
    - status
  properties:
    id:
      type: string
      format: uuid
      description: Vendor ID
      example: "123e4567-e89b-12d3-a456-426655440000"
    name:
      type: string
      description: Vendor name
      example: "Amazon"
    status:
      type: string
      enum: ["active", "inactive"]
      description: Vendor status
      example: "active"

VendorResponse:
  allOf:
    - $ref: '#/VendorBase'
    - type: object
      required:
        - description
      properties:
        description:
          type: [string, "null"]
          description: Vendor description
          example: "Online shopping"

VendorSummaryResponse:
  allOf:
    - $ref: '#/VendorResponse'
    - type: object
      required:
        - numberOfTransactions
        - totalSpend
      properties:
        numberOfTransactions:
          type: integer
          format: int64
          description: Total number of transactions
          example: 10
          minimum: 0
        totalSpend:
          type: integer
          format: int64
          description: Total spend in cents
          example: 5000

VendorListResponse:
  allOf:
    - $ref: '../schemas/Common.yaml#/PaginatedResponse'
    - type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/VendorSummaryResponse'

VendorOptionResponse:
  type: object
  required:
    - id
    - name
  properties:
    id:
      type: string
      format: uuid
      description: Vendor ID
      example: "123e4567-e89b-12d3-a456-426655440000"
    name:
      type: string
      description: Vendor name
      example: "Amazon"

VendorOptionListResponse:
  type: array
  items:
    $ref: '#/VendorOptionResponse'

CreateVendorRequest:
  type: object
  required:
    - name
  properties:
    name:
      type: string
      description: Vendor name
      minLength: 3
      example: "Amazon"
    description:
      type: [string, "null"]
      description: Vendor description
      maxLength: 500
      example: "Online shopping"

UpdateVendorRequest:
  allOf:
    - $ref: '#/CreateVendorRequest'

VendorTrendItem:
  type: object
  required:
    - periodId
    - periodName
    - totalSpend
  properties:
    periodId:
      type: string
      format: uuid
      description: Period ID
      example: "123e4567-e89b-12d3-a456-426655440000"
    periodName:
      type: string
      description: Period name
      example: "March 2026"
    totalSpend:
      type: integer
      format: int64
      description: Total spend in cents for this period
      example: 12000

VendorTopCategoryItem:
  type: object
  required:
    - categoryId
    - categoryName
    - totalSpend
    - percentage
  properties:
    categoryId:
      type: string
      format: uuid
      description: Category ID
      example: "123e4567-e89b-12d3-a456-426655440000"
    categoryName:
      type: string
      description: Category name
      example: "Groceries"
    totalSpend:
      type: integer
      format: int64
      description: Total spend in cents for this category
      example: 8000
    percentage:
      type: number
      format: double
      description: Percentage of total vendor spend
      example: 66.7

VendorTransactionItem:
  type: object
  required:
    - id
    - date
    - amount
    - description
  properties:
    id:
      type: string
      format: uuid
      description: Transaction ID
      example: "123e4567-e89b-12d3-a456-426655440000"
    date:
      type: string
      format: date
      description: Transaction date
      example: "2026-03-15"
    amount:
      type: integer
      format: int64
      description: Transaction amount in cents
      example: 2500
    description:
      type: string
      description: Transaction description
      example: "Weekly groceries"
    categoryId:
      type: [string, "null"]
      format: uuid
      description: Category ID
      example: "123e4567-e89b-12d3-a456-426655440000"
    categoryName:
      type: [string, "null"]
      description: Category name
      example: "Groceries"

VendorDetailResponse:
  allOf:
    - $ref: '#/VendorResponse'
    - type: object
      required:
        - periodSpend
        - transactionCount
        - averageTransactionAmount
        - trend
        - topCategories
        - recentTransactions
      properties:
        periodSpend:
          type: integer
          format: int64
          description: Total spend in cents for the requested period
          example: 12000
        transactionCount:
          type: integer
          format: int64
          description: Number of transactions in the requested period
          example: 5
        averageTransactionAmount:
          type: integer
          format: int64
          description: Average transaction amount in cents
          example: 2400
        trend:
          type: array
          description: Spending trend across periods
          items:
            $ref: '#/VendorTrendItem'
        topCategories:
          type: array
          description: Top categories by spend at this vendor
          items:
            $ref: '#/VendorTopCategoryItem'
        recentTransactions:
          type: array
          description: Recent transactions at this vendor
          items:
            $ref: '#/VendorTransactionItem'

VendorStatsResponse:
  type: object
  required:
    - totalVendors
    - totalSpendThisPeriod
    - avgSpendPerVendor
  properties:
    totalVendors:
      type: integer
      format: int64
      description: Total number of vendors
      example: 20
    totalSpendThisPeriod:
      type: integer
      format: int64
      description: Total spend across all vendors in cents for this period
      example: 150000
    avgSpendPerVendor:
      type: integer
      format: int64
      description: Average spend per vendor in cents for this period
      example: 7500

MergeVendorRequest:
  type: object
  required:
    - targetVendorId
  properties:
    targetVendorId:
      type: string
      format: uuid
      description: ID of the vendor to merge into (the target that survives)
      example: "123e4567-e89b-12d3-a456-426655440000"
