EncryptedVendorResponse:
  type: object
  required:
    - id
    - status
    - nameEnc
  properties:
    id:
      type: string
      format: uuid
    status:
      type: string
      enum: [active, inactive]
    nameEnc:
      type: string
      description: Base64 AES-GCM envelope for the vendor name
    descriptionEnc:
      type: [string, "null"]

VendorListResponse:
  allOf:
    - $ref: './Common.yaml#/PaginatedResponse'
    - type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/EncryptedVendorResponse'

VendorOptionResponse:
  type: object
  required:
    - id
    - nameEnc
  properties:
    id:
      type: string
      format: uuid
    nameEnc:
      type: string

VendorOptionListResponse:
  type: array
  items:
    $ref: '#/VendorOptionResponse'

CreateVendorRequest:
  type: object
  required:
    - name
  properties:
    name:
      type: string
    description:
      type: [string, "null"]

UpdateVendorRequest:
  allOf:
    - $ref: '#/CreateVendorRequest'
