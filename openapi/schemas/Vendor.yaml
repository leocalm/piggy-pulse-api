VendorBase:
  type: object
  required:
    - id
    - name
    - status
  properties:
    id:
      type: string
      format: uuid
      description: Vendor ID
      example: "123e4567-e89b-12d3-a456-426655440000"
    name:
      type: string
      description: Vendor name
      example: "Amazon"
    status:
      type: string
      enum: ["active", "inactive"]
      description: Vendor status
      example: "active"

VendorResponse:
  allOf:
    - $ref: '#/VendorBase'
    - type: object
      required:
        - description
      properties:
        description:
          type: [string, "null"]
          description: Vendor description
          example: "Online shopping"

VendorSummaryResponse:
  allOf:
    - $ref: '#/VendorResponse'
    - type: object
      required:
        - numberOfTransactions
      properties:
        numberOfTransactions:
          type: integer
          description: Total number of transactions
          example: 10
          minimum: 0

VendorListResponse:
  allOf:
    - $ref: '../schemas/Common.yaml#/PaginatedResponse'
    - type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/VendorSummaryResponse'

VendorOptionResponse:
  type: object
  required:
    - id
    - name
  properties:
    id:
      type: string
      format: uuid
      description: Vendor ID
      example: "123e4567-e89b-12d3-a456-426655440000"
    name:
      type: string
      description: Vendor name
      example: "Amazon"

VendorOptionListResponse:
  type: array
  items:
    $ref: '#/VendorOptionResponse'

CreateVendorRequest:
  type: object
  required:
    - name
  properties:
    name:
      type: string
      description: Vendor name
      minLength: 3
      example: "Amazon"
    description:
      type: [string, "null"]
      description: Vendor description
      maxLength: 500
      example: "Online shopping"

UpdateVendorRequest:
  allOf:
    - $ref: '#/CreateVendorRequest'
