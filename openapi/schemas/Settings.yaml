# ===== Profile =====

ProfileResponse:
  type: object
  required:
    - name
    - currency
    - avatar
  properties:
    name:
      type: string
      example: "Leonardo"
    currency:
      type: string
      example: "EUR"
    avatar:
      type: string
      maxLength: 64
      description: Emoji used as the user's avatar
      example: "🐷"

UpdateProfileRequest:
  type: object
  required:
    - name
    - currency
  properties:
    name:
      type: string
      example: "Leonardo"
    currency:
      type: string
      example: "EUR"
    avatar:
      type: string
      maxLength: 64
      description: Emoji used as the user's avatar. Optional — omit to keep the existing value.
      example: "🐷"

# ===== Preferences =====

Theme:
  type: string
  enum: ["light", "dark", "system"]
  example: "dark"

DateFormat:
  type: string
  enum: ["DD/MM/YYYY", "MM/DD/YYYY", "YYYY-MM-DD"]
  example: "DD/MM/YYYY"

NumberFormat:
  type: string
  enum: ["1,234.56", "1.234,56", "1 234,56"]
  example: "1.234,56"

ColorTheme:
  type: string
  enum: ["nebula", "sunrise", "sage_stone", "deep_ocean", "warm_rose", "moonlit"]
  example: "nebula"

DashboardLayout:
  type: object
  properties:
    widgetOrder:
      type: array
      items:
        type: string
      example: ["balance", "spending", "budget"]
    hiddenWidgets:
      type: array
      items:
        type: string
      example: []
    visibleAccountIds:
      type: array
      items:
        type: string
        format: uuid
      description: Account IDs to display as individual cards on the dashboard. If omitted, all active accounts are shown.

PreferencesResponse:
  type: object
  required:
    - theme
    - dateFormat
    - numberFormat
    - language
    - compactMode
    - dashboardLayout
    - colorTheme
  properties:
    theme:
      $ref: '#/Theme'
    dateFormat:
      $ref: '#/DateFormat'
    numberFormat:
      $ref: '#/NumberFormat'
    language:
      type: string
      description: BCP 47 language tag
      example: "en"
    compactMode:
      type: boolean
      description: Whether compact mode is enabled
      example: false
    dashboardLayout:
      $ref: '#/DashboardLayout'
    colorTheme:
      $ref: '#/ColorTheme'

UpdatePreferencesRequest:
  type: object
  required:
    - theme
    - dateFormat
    - numberFormat
    - language
  properties:
    theme:
      $ref: '#/Theme'
    dateFormat:
      $ref: '#/DateFormat'
    numberFormat:
      $ref: '#/NumberFormat'
    language:
      type: string
      description: BCP 47 language tag
      example: "en"
    compactMode:
      type: boolean
      description: Whether compact mode is enabled
      default: false
      example: false
    dashboardLayout:
      $ref: '#/DashboardLayout'
    colorTheme:
      $ref: '#/ColorTheme'

# ===== Sessions =====

SessionResponse:
  type: object
  required:
    - id
    - createdAt
    - isCurrent
  properties:
    id:
      type: string
      format: uuid
      example: "123e4567-e89b-12d3-a456-426655440000"
    createdAt:
      type: string
      format: date-time
      example: "2024-01-15T10:30:00Z"
    isCurrent:
      type: boolean
      description: Whether this is the session making the request
      example: true

SessionListResponse:
  type: array
  items:
    $ref: '#/SessionResponse'

# ===== Account Actions =====

DeleteAccountRequest:
  type: object
  required:
    - password
  properties:
    password:
      type: string
      format: password
      description: Current password to confirm intent
      example: "correct-horse-battery-staple"

ResetStructureRequest:
  type: object
  required:
    - password
  properties:
    password:
      type: string
      format: password
      description: Current password to confirm intent
      example: "correct-horse-battery-staple"
