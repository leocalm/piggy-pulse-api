get:
  tags:
    - Subscriptions
  summary: List subscriptions
  operationId: listSubscriptions
  parameters:
    - name: status
      in: query
      required: false
      description: Filter by subscription status
      schema:
        $ref: '../schemas/Subscription.yaml#/SubscriptionStatus'
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../schemas/Subscription.yaml#/SubscriptionListResponse'
    '400':
      $ref: '../responses/BadRequest.yaml'
    '401':
      $ref: '../responses/Unauthorized.yaml'
    '500':
      $ref: '../responses/InternalServerError.yaml'

post:
  tags:
    - Subscriptions
  summary: Create subscription
  operationId: createSubscription
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/Subscription.yaml#/CreateSubscriptionRequest'
  responses:
    '201':
      description: Subscription created
      content:
        application/json:
          schema:
            $ref: '../schemas/Subscription.yaml#/SubscriptionResponse'
    '400':
      $ref: '../responses/BadRequest.yaml'
    '422':
      $ref: '../responses/UnprocessableEntity.yaml'
    '401':
      $ref: '../responses/Unauthorized.yaml'
    '500':
      $ref: '../responses/InternalServerError.yaml'
