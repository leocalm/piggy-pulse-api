get:
  tags:
    - Dashboard
  summary: Get current period spending history
  operationId: getDashboardCurrentPeriodHistory
  parameters:
    - $ref: '../parameters/PeriodId.yaml'
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../schemas/Dashboard.yaml#/CurrentPeriodHistoryResponse'
    '400':
      $ref: '../responses/BadRequest.yaml'
    '401':
      $ref: '../responses/Unauthorized.yaml'
    '404':
      $ref: '../responses/NotFound.yaml'
    '500':
      $ref: '../responses/InternalServerError.yaml'
