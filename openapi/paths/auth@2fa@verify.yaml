post:
  tags:
    - Auth
  summary: Confirm 2FA setup or complete login challenge
  operationId: verifyTwoFactor
  description: |
    Dual-purpose endpoint that supports both authenticated and unauthenticated contexts:

    **Setup confirmation (authenticated):**
    Called after `POST /auth/2fa/enable` to activate 2FA with a valid TOTP code.
    Requires an active session cookie. Request body: `{ "code": "123456" }`.

    **Login challenge (unauthenticated):**
    Called after a login that returned `requiresTwoFactor: true`, using the
    `twoFactorToken` from the login response. No session cookie required.
    Request body: `{ "code": "123456", "twoFactorToken": "..." }`.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/Auth.yaml#/TwoFactorCompleteRequest'
  responses:
    '200':
      description: 2FA verified — returns authenticated user
      content:
        application/json:
          schema:
            $ref: '../schemas/Auth.yaml#/AuthenticatedResponse'
    '400':
      $ref: '../responses/BadRequest.yaml'
    '422':
      $ref: '../responses/UnprocessableEntity.yaml'
    '401':
      $ref: '../responses/Unauthorized.yaml'
    '500':
      $ref: '../responses/InternalServerError.yaml'
