get:
  tags:
    - Accounts
  summary: Get balance history for all active accounts
  description: Returns balance history for all active accounts in a single request, eliminating N+1 per-account calls.
  operationId: getBatchBalanceHistory
  parameters:
    - $ref: '../parameters/PeriodId.yaml'
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../schemas/Accounts.yaml#/BatchBalanceHistoryResponse'
    '400':
      $ref: '../responses/BadRequest.yaml'
    '401':
      $ref: '../responses/Unauthorized.yaml'
    '500':
      $ref: '../responses/InternalServerError.yaml'
