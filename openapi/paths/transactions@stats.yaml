get:
  tags:
    - Transactions
  summary: Get transaction stats for a period
  operationId: getTransactionStats
  parameters:
    - $ref: '../parameters/PeriodId.yaml'
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../schemas/Transaction.yaml#/TransactionStatsResponse'
    '400':
      $ref: '../responses/BadRequest.yaml'
    '401':
      $ref: '../responses/Unauthorized.yaml'
    '500':
      $ref: '../responses/InternalServerError.yaml'
