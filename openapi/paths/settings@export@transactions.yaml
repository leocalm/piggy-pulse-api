get:
  tags:
    - Settings
  summary: Export transactions as CSV
  operationId: exportTransactions
  responses:
    '200':
      description: CSV file
      content:
        text/csv:
          schema:
            type: string
            format: binary
    '401':
      $ref: '../responses/Unauthorized.yaml'
    '500':
      $ref: '../responses/InternalServerError.yaml'
