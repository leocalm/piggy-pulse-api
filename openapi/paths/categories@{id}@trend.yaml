get:
  tags:
    - Categories
  summary: Get category spending trend across periods
  operationId: getCategoryTrend
  parameters:
    - $ref: '../parameters/Id.yaml'
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 24
        default: 6
      description: Number of periods to include (1–24, default 6)
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../schemas/Category.yaml#/CategoryTrendItem'
    '400':
      $ref: '../responses/BadRequest.yaml'
    '401':
      $ref: '../responses/Unauthorized.yaml'
    '404':
      $ref: '../responses/NotFound.yaml'
    '500':
      $ref: '../responses/InternalServerError.yaml'
