get:
  tags:
    - Transactions
  summary: List transactions
  operationId: listTransactions
  parameters:
    - $ref: '../parameters/PeriodId.yaml'
    - $ref: '../parameters/Cursor.yaml'
    - $ref: '../parameters/Limit.yaml'
    - $ref: '../parameters/Direction.yaml'
    - $ref: '../parameters/AccountId.yaml'
    - $ref: '../parameters/CategoryId.yaml'
    - $ref: '../parameters/VendorId.yaml'
    - $ref: '../parameters/FromDate.yaml'
    - $ref: '../parameters/ToDate.yaml'
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../schemas/Transaction.yaml#/TransactionListResponse'
    '400':
      $ref: '../responses/BadRequest.yaml'
    '401':
      $ref: '../responses/Unauthorized.yaml'
    '500':
      $ref: '../responses/InternalServerError.yaml'

post:
  tags:
    - Transactions
  summary: Create transaction
  operationId: createTransaction
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/Transaction.yaml#/CreateTransactionRequest'
  responses:
    '201':
      description: Transaction created
      content:
        application/json:
          schema:
            $ref: '../schemas/Transaction.yaml#/TransactionResponse'
    '400':
      $ref: '../responses/BadRequest.yaml'
    '422':
      $ref: '../responses/UnprocessableEntity.yaml'
    '401':
      $ref: '../responses/Unauthorized.yaml'
    '500':
      $ref: '../responses/InternalServerError.yaml'
