get:
  tags:
    - Transactions
  summary: List effective transactions for a period
  description: |
    Returns every effective logical transaction whose Latest_Row's
    occurred_at falls inside the given budget period. Amounts and
    descriptions are returned as base64-encoded AES-GCM envelopes;
    the client decrypts with its session DEK and reduces locally
    into dashboards, breakdowns, and period totals.

    No pagination, no filters, no server-side sorting — the whole
    period comes back on one call.
  operationId: listTransactionsByPeriod
  parameters:
    - name: periodId
      in: query
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../schemas/Transaction.yaml#/EncryptedTransactionResponse'
    '400':
      $ref: '../responses/BadRequest.yaml'
    '401':
      $ref: '../responses/Unauthorized.yaml'
    '404':
      $ref: '../responses/NotFound.yaml'
    '500':
      $ref: '../responses/InternalServerError.yaml'

post:
  tags:
    - Transactions
  summary: Create transaction
  operationId: createTransaction
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/Transaction.yaml#/CreateTransactionRequest'
  responses:
    '201':
      description: Transaction created
      content:
        application/json:
          schema:
            $ref: '../schemas/Transaction.yaml#/EncryptedTransactionResponse'
    '400':
      $ref: '../responses/BadRequest.yaml'
    '422':
      $ref: '../responses/UnprocessableEntity.yaml'
    '401':
      $ref: '../responses/Unauthorized.yaml'
    '500':
      $ref: '../responses/InternalServerError.yaml'
