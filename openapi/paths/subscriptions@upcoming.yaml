get:
  tags:
    - Subscriptions
  summary: Get upcoming subscription charges
  operationId: getUpcomingCharges
  parameters:
    - name: limit
      in: query
      required: false
      description: Maximum number of upcoming charges to return (1–50, default 10)
      schema:
        type: integer
        format: int64
        minimum: 1
        maximum: 50
        default: 10
        example: 10
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../schemas/Subscription.yaml#/UpcomingChargesResponse'
    '401':
      $ref: '../responses/Unauthorized.yaml'
    '500':
      $ref: '../responses/InternalServerError.yaml'
