# Docker Compose for V2 integration tests
# Usage: docker compose -f docker-compose.test.yaml up -d --wait

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: piggy_pulse_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test_password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d piggy_pulse_test"]
      interval: 2s
      timeout: 3s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data
