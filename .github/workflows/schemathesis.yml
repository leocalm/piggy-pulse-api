name: Schemathesis

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  schemathesis:
    name: API contract tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: piggy_pulse_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgres://postgres:test_password@localhost:5432/piggy_pulse_test
      PIGGY_PULSE_DATABASE__URL: postgres://postgres:test_password@localhost:5432/piggy_pulse_test
      # Fixed key for CI — not used in production
      ROCKET_SECRET_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      PIGGY_PULSE_EMAIL__ENABLED: "false"
      # Match local PiggyPulse.toml base_path so v2 routes land at /v2
      PIGGY_PULSE_API__BASE_PATH: /v2
      # Insecure fixed key — safe for ephemeral CI; real key is in PiggyPulse.toml locally
      # Must contain letters so figment doesn't coerce it to an integer
      PIGGY_PULSE_TWO_FACTOR__ENCRYPTION_KEY: "deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install sqlx-cli
        uses: taiki-e/install-action@v2
        with:
          tool: sqlx-cli

      - name: Run migrations
        run: sqlx migrate run

      - name: Build server
        run: cargo build --bin piggy-pulse

      - name: Start server
        run: |
          ./target/debug/piggy-pulse &
          echo "Waiting for server..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:8000/v2/health | grep -q '"status":"ok"'; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
            if [ "$i" -eq 30 ]; then
              echo "Server failed to start" && exit 1
            fi
          done

      - name: Bundle OpenAPI spec
        run: npx --yes @redocly/cli@2.20.5 bundle openapi/v2.yaml -o /tmp/v2_full.yaml

      # Seed at least one of every entity type so schemathesis can exercise
      # the 200-response code path of every endpoint that takes a real ID.
      # See PIG-263 for the rationale — without this step, random UUIDs in
      # {id}/?periodId=... produce only 404s, which match the spec and hide
      # schema drift (e.g. the PIG-262 fixed-categories bug).
      - name: Seed real data and capture IDs
        id: seed
        run: |
          set -euo pipefail
          BASE=http://localhost:8000/v2
          EMAIL="ci-$(date +%s%N)@schemathesis.test"
          PASSWORD="correct-horse-battery-staple-99"

          TOKEN=""
          req() {
            local method="$1" path="$2" body="${3:-}"
            local args=(-sS -X "$method" "$BASE$path" -H "Content-Type: application/json")
            [ -n "$TOKEN" ] && args+=(-H "Authorization: Bearer $TOKEN")
            [ -n "$body" ] && args+=(-d "$body")
            curl "${args[@]}"
          }

          echo "::group::Register user"
          REGISTER=$(req POST /auth/register \
            "{\"email\":\"$EMAIL\",\"password\":\"$PASSWORD\",\"name\":\"CI\"}")
          TOKEN=$(echo "$REGISTER" | jq -r '.token // empty')
          if [ -z "$TOKEN" ]; then
            echo "Register failed: $REGISTER" && exit 1
          fi
          echo "::endgroup::"

          # Account creation requires a default currency in settings.
          echo "::group::Set default currency"
          req PUT /settings/profile \
            '{"name":"CI","currency":"USD","avatar":""}' >/dev/null
          echo "::endgroup::"

          echo "::group::Fetch currency id for account body"
          CURRENCY_ID=$(req GET /currencies | jq -r '.[0].id')
          echo "::endgroup::"

          echo "::group::Create period"
          # Note: periodType discriminator expects PascalCase ("ManualEndDate")
          # on the wire because the Rust enum variant is not renamed.
          PERIOD=$(req POST /periods \
            '{"name":"Schemathesis CI","startDate":"2026-01-01","periodType":"ManualEndDate","manualEndDate":"2026-12-31"}')
          PERIOD_ID=$(echo "$PERIOD" | jq -r '.id')
          echo "$PERIOD"
          echo "::endgroup::"

          echo "::group::Create categories"
          CATEGORY_ID=$(req POST /categories \
            '{"name":"Seed Groceries","type":"expense","icon":"🛒","behavior":"variable"}' \
            | jq -r '.id')
          FIXED_CATEGORY_ID=$(req POST /categories \
            '{"name":"Seed Rent","type":"expense","icon":"🏠","behavior":"fixed"}' \
            | jq -r '.id')
          echo "::endgroup::"

          echo "::group::Create account"
          ACCOUNT_ID=$(req POST /accounts \
            "{\"name\":\"Seed Checking\",\"type\":\"Checking\",\"color\":\"#ff9800\",\"initialBalance\":100000,\"currencyId\":\"$CURRENCY_ID\"}" \
            | jq -r '.id')
          echo "::endgroup::"

          echo "::group::Create vendor"
          VENDOR_ID=$(req POST /vendors \
            '{"name":"Seed Vendor Inc"}' | jq -r '.id')
          echo "::endgroup::"

          echo "::group::Create transaction"
          # transactionType discriminator also uses PascalCase on the wire.
          TRANSACTION_ID=$(req POST /transactions \
            "{\"transactionType\":\"Regular\",\"date\":\"2026-02-15\",\"description\":\"Seed tx\",\"amount\":2500,\"fromAccountId\":\"$ACCOUNT_ID\",\"categoryId\":\"$CATEGORY_ID\",\"vendorId\":\"$VENDOR_ID\"}" \
            | jq -r '.id')
          echo "::endgroup::"

          echo "::group::Create budget target"
          req POST "/targets?periodId=$PERIOD_ID" \
            "{\"categoryId\":\"$CATEGORY_ID\",\"value\":25000}" >/dev/null
          echo "::endgroup::"

          echo "::group::Create subscription"
          SUBSCRIPTION_ID=$(req POST /subscriptions \
            "{\"name\":\"Seed Netflix\",\"categoryId\":\"$FIXED_CATEGORY_ID\",\"billingAmount\":1599,\"billingCycle\":\"monthly\",\"billingDay\":15,\"nextChargeDate\":\"2026-05-15\"}" \
            | jq -r '.id')
          echo "::endgroup::"

          echo "::group::Create overlay"
          OVERLAY_ID=$(req POST /overlays \
            '{"name":"Seed Overlay","startDate":"2026-02-01","endDate":"2026-02-28","inclusionMode":"manual"}' \
            | jq -r '.id')
          echo "::endgroup::"

          {
            echo "token=$TOKEN"
            echo "period_id=$PERIOD_ID"
            echo "account_id=$ACCOUNT_ID"
            echo "category_id=$CATEGORY_ID"
            echo "vendor_id=$VENDOR_ID"
            echo "transaction_id=$TRANSACTION_ID"
            echo "subscription_id=$SUBSCRIPTION_ID"
            echo "overlay_id=$OVERLAY_ID"
          } >> "$GITHUB_OUTPUT"

      - name: Write schemathesis config
        # The schemathesis config file is the modern (4.x) mechanism for
        # injecting real parameter values into generated requests. The
        # top-level `parameters` table matches by parameter name (so every
        # endpoint with a `periodId` query param gets the real one), and
        # `[[operations]]` blocks scope `{id}` to the matching resource.
        run: |
          cat > /tmp/schemathesis.toml <<'TOML'
          [parameters]
          periodId = "$PERIOD_ID"
          accountId = "$ACCOUNT_ID"
          categoryId = "$CATEGORY_ID"
          vendorId = "$VENDOR_ID"
          transactionId = "$TRANSACTION_ID"
          subscriptionId = "$SUBSCRIPTION_ID"
          overlayId = "$OVERLAY_ID"
          txId = "$TRANSACTION_ID"
          code = "USD"

          [[operations]]
          include-path-regex = "^/periods/"
          [operations.parameters]
          id = "$PERIOD_ID"

          [[operations]]
          include-path-regex = "^/accounts/"
          [operations.parameters]
          id = "$ACCOUNT_ID"

          [[operations]]
          include-path-regex = "^/categories/"
          [operations.parameters]
          id = "$CATEGORY_ID"

          [[operations]]
          include-path-regex = "^/vendors/"
          [operations.parameters]
          id = "$VENDOR_ID"

          [[operations]]
          include-path-regex = "^/transactions/"
          [operations.parameters]
          id = "$TRANSACTION_ID"

          [[operations]]
          include-path-regex = "^/subscriptions/"
          [operations.parameters]
          id = "$SUBSCRIPTION_ID"

          [[operations]]
          include-path-regex = "^/overlays/"
          [operations.parameters]
          id = "$OVERLAY_ID"
          TOML

      - name: Run schemathesis
        env:
          PERIOD_ID: ${{ steps.seed.outputs.period_id }}
          ACCOUNT_ID: ${{ steps.seed.outputs.account_id }}
          CATEGORY_ID: ${{ steps.seed.outputs.category_id }}
          VENDOR_ID: ${{ steps.seed.outputs.vendor_id }}
          TRANSACTION_ID: ${{ steps.seed.outputs.transaction_id }}
          SUBSCRIPTION_ID: ${{ steps.seed.outputs.subscription_id }}
          OVERLAY_ID: ${{ steps.seed.outputs.overlay_id }}
        run: |
          pip install --quiet schemathesis
          schemathesis --config-file /tmp/schemathesis.toml run /tmp/v2_full.yaml \
            --url http://localhost:8000/v2 \
            --header "Authorization: Bearer ${{ steps.seed.outputs.token }}" \
            --checks not_a_server_error,response_schema_conformance,status_code_conformance \
            --max-examples 10 \
            --exclude-path "/auth/logout" \
            --exclude-path "/auth/refresh" \
            `# PIG-264: PUT /subscriptions/{id} returns 500 — re-enable once fixed.` \
            --exclude-operation-id "updateSubscription" \
            `# PIG-266: PUT /categories/{id} returns 500 — re-enable once fixed.` \
            --exclude-operation-id "updateCategory" \
            `# DELETE endpoints destroy the seed data mid-run and then cascade` \
            `# into 404s for the remaining operations. Re-enable once we have` \
            `# per-operation teardown or stateful re-seeding.` \
            --exclude-method "DELETE" \
            --warnings off \
            --report junit

      - name: Upload JUnit results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: schemathesis-junit
          path: schemathesis-report/*.xml
          if-no-files-found: ignore
