# .github/workflows/publish-and-deploy.yml
#
# Builds API and Cron images in parallel on GitHub Actions,
# then triggers a deploy webhook on the Hetzner VPS.
#
# Replaces:
#   - .github/workflows/publish-images.yml  (sequential builds)
#   - .drone.yml                            (deploy step)

name: Publish & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-deploy-main
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────
  # Build API image
  # ──────────────────────────────────────────────
  build-api:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: vars
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/piggy-pulse-api:latest
            ghcr.io/${{ steps.vars.outputs.owner }}/piggy-pulse-api:${{ steps.vars.outputs.short_sha }}
          cache-from: type=registry,ref=ghcr.io/${{ steps.vars.outputs.owner }}/piggy-pulse-api:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ steps.vars.outputs.owner }}/piggy-pulse-api:buildcache,mode=max

  # ──────────────────────────────────────────────
  # Build Cron image (runs in parallel with API)
  # ──────────────────────────────────────────────
  build-cron:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: vars
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push Cron image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.cron
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/piggy-pulse-cron:latest
            ghcr.io/${{ steps.vars.outputs.owner }}/piggy-pulse-cron:${{ steps.vars.outputs.short_sha }}
          cache-from: type=registry,ref=ghcr.io/${{ steps.vars.outputs.owner }}/piggy-pulse-cron:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ steps.vars.outputs.owner }}/piggy-pulse-cron:buildcache,mode=max

  # ──────────────────────────────────────────────
  # Deploy: runs after BOTH images are pushed
  # ──────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [build-api, build-cron]
    steps:
      - name: Trigger deploy webhook
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            -d '{"commit": "${{ github.sha }}", "ref": "${{ github.ref }}"}' \
            "${{ secrets.DEPLOY_WEBHOOK_URL }}")

          echo "Webhook responded with HTTP $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "::error::Deploy webhook failed with status $HTTP_STATUS"
            exit 1
          fi

          echo "✅ Deploy triggered for ${GITHUB_SHA::7}"
